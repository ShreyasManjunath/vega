name: Semantic Release

on:
  push:
    branches: [ "main" ]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest

    container:
      image: node:20-alpine

    steps:
      - name: Install git and openssh
        run: apk add --no-cache git openssh

      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Mark workspace safe
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >
          npx --yes
          --package semantic-release@24.2.9
          --package @semantic-release/commit-analyzer
          --package @semantic-release/release-notes-generator
          --package @semantic-release/changelog
          --package @semantic-release/exec
          --package @semantic-release/git
          --package @semantic-release/github
          semantic-release
